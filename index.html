<!DOCTYPE html>
<html lang='es'>
<head>
  <meta charset='utf-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1'>
  <title>Feria de Ciencias 2026</title>
  <!-- Fonts: Space Grotesk for Headlines, Inter for Body -->
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
      tailwind.config = {
          darkMode: "class",
          theme: {
              extend: {
                  colors: {
                      primary: "#816ab8",
                      secondary: "#7d7293",
                      tertiary: "#afa63c",
                      background: "#16141b",
                      surface: "rgba(121, 118, 124, 0.12)",
                      "on-surface": "#f6f2fb",
                      "on-surface-variant": "#ddd6e8",
                      "surface-container": "rgba(121, 118, 124, 0.08)",
                      "surface-container-low": "rgba(121, 118, 124, 0.06)",
                      "surface-container-lowest": "#16141b",
                      "primary-container": "rgba(129, 106, 184, 0.22)",
                      "secondary-container": "rgba(125, 114, 147, 0.16)",
                      "on-primary-container": "#f6f2fb",
                      "on-secondary-container": "#ddd6e8"
                  },
                  borderRadius: {
                      DEFAULT: "1.5rem",
                      lg: "2rem",
                      xl: "2.5rem",
                      full: "9999px"
                  },
                  fontFamily: {
                      headline: ["Space Grotesk", "Orbitron", "sans-serif"],
                      body: ["Inter", "sans-serif"]
                  }
              }
          }
      }
  </script>
  <link rel='stylesheet' href='./styles.css'>
  <script defer src='./app.js'></script>
</head>
<body class="font-body text-on-surface bg-background min-h-screen overflow-x-hidden">
  <!-- Ambient Background Layer -->
  <div class="fixed inset-0 pointer-events-none -z-10 bg-background overflow-hidden">
      <div class="absolute -top-[10%] -left-[10%] w-[50%] h-[50%] bg-primary/10 rounded-full blur-[120px]"></div>
      <div class="absolute top-[10%] -right-[10%] w-[40%] h-[40%] bg-secondary/15 rounded-full blur-[100px]"></div>
      <div class="absolute -bottom-[10%] left-[20%] w-[60%] h-[60%] bg-tertiary/10 rounded-full blur-[150px]"></div>
  </div>

  <div id='app'></div>
</body>
</html>
